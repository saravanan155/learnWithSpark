<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1380" viewBox="0 0 980 1380" role="img" aria-labelledby="title desc">
  <title id="title">Learn with Spark simplified agentic flow</title>
  <desc id="desc">A simplified top-to-bottom graph of the Learn with Spark pipeline with three human gates, testing, repair, and publish.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L11,5 z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L11,5 z" fill="#0284c7" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .agent { fill: #eff6ff; stroke: #38bdf8; }
      .gate { fill: #fffbeb; stroke: #f59e0b; }
      .check { fill: #f0fdf4; stroke: #22c55e; }
      .write { fill: #fdf2f8; stroke: #ec4899; }
      .game { fill: #f5f3ff; stroke: #8b5cf6; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .edge { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-blue { fill: none; stroke: #0284c7; stroke-width: 2.5; marker-end: url(#arrow-blue); }
    </style>
  </defs>

  <rect class="bg" width="980" height="1380" />
  <text class="title" x="490" y="54" text-anchor="middle">Learn with Spark: Agentic Pipeline</text>
  <text class="subtitle" x="490" y="84" text-anchor="middle">Clean demo view: autonomous reads, human gates, repair, and gated publish</text>

  <!-- Main pipeline -->
  <rect class="box" x="340" y="125" width="300" height="78" rx="16" />
  <text class="label" x="490" y="156" text-anchor="middle">Start</text>
  <text class="small" x="490" y="181" text-anchor="middle">Owner enters concept</text>

  <path class="edge" d="M490 203 V242" />
  <rect class="box agent" x="340" y="242" width="300" height="92" rx="16" />
  <text class="label" x="490" y="274" text-anchor="middle">Research Agent</text>
  <text class="small" x="490" y="298" text-anchor="middle">Nebius creates 2-3 LessonSpecs</text>
  <text class="tiny" x="490" y="318" text-anchor="middle">READ / autonomous</text>

  <path class="edge" d="M490 334 V373" />
  <rect class="box gate" x="340" y="373" width="300" height="100" rx="16" />
  <text class="label" x="490" y="405" text-anchor="middle">Human Gate 1</text>
  <text class="small" x="490" y="429" text-anchor="middle">Pick, edit full LessonSpec,</text>
  <text class="small" x="490" y="451" text-anchor="middle">regenerate, or abandon</text>

  <path class="edge" d="M490 473 V512" />
  <rect class="box agent" x="340" y="512" width="300" height="92" rx="16" />
  <text class="label" x="490" y="544" text-anchor="middle">Guardrail Agent</text>
  <text class="small" x="490" y="568" text-anchor="middle">Kid safety + age check</text>
  <text class="tiny" x="490" y="588" text-anchor="middle">READ / autonomous</text>

  <path class="edge" d="M490 604 V643" />
  <rect class="box gate" x="340" y="643" width="300" height="92" rx="16" />
  <text class="label" x="490" y="675" text-anchor="middle">Human Gate 2</text>
  <text class="small" x="490" y="699" text-anchor="middle">Approve final safe spec</text>
  <text class="tiny" x="490" y="719" text-anchor="middle">misinformation checkpoint</text>

  <path class="edge" d="M490 735 V774" />
  <rect class="box agent" x="340" y="774" width="300" height="92" rx="16" />
  <text class="label" x="490" y="806" text-anchor="middle">Coding Agent</text>
  <text class="small" x="490" y="830" text-anchor="middle">Claude generates GameLevel.tsx</text>
  <text class="tiny" x="490" y="850" text-anchor="middle">uses approved LessonSpec</text>

  <path class="edge" d="M490 866 V905" />
  <rect class="box check" x="340" y="905" width="300" height="92" rx="16" />
  <text class="label" x="490" y="937" text-anchor="middle">Static Check</text>
  <text class="small" x="490" y="961" text-anchor="middle">Imports, export, no network</text>
  <text class="tiny" x="490" y="981" text-anchor="middle">deterministic</text>

  <path class="edge" d="M490 997 V1036" />
  <rect class="box check" x="340" y="1036" width="300" height="92" rx="16" />
  <text class="label" x="490" y="1068" text-anchor="middle">Test + Judge</text>
  <text class="small" x="490" y="1092" text-anchor="middle">Quality review / PASS or FAIL</text>
  <text class="tiny" x="490" y="1112" text-anchor="middle">Nebius judge optional</text>

  <path class="edge-blue" d="M490 1128 V1167" />
  <rect class="box gate" x="340" y="1167" width="300" height="92" rx="16" />
  <text class="label" x="490" y="1199" text-anchor="middle">Human Gate 3</text>
  <text class="small" x="490" y="1223" text-anchor="middle">Play-test generated level</text>
  <text class="tiny" x="490" y="1243" text-anchor="middle">approve before publish</text>

  <path class="edge-blue" d="M490 1259 V1298" />
  <rect class="box write" x="340" y="1298" width="300" height="70" rx="16" />
  <text class="label" x="490" y="1326" text-anchor="middle">Publish + Learner Game</text>
  <text class="small" x="490" y="1350" text-anchor="middle">SQLite + next sequential lesson</text>

  <!-- Side notes. No connecting arrows, so the main flow stays clean. -->
  <rect class="note" x="60" y="376" width="230" height="94" rx="12" />
  <text class="label" x="175" y="406" text-anchor="middle">Gate 1 branches</text>
  <text class="small" x="175" y="431" text-anchor="middle">Regenerate loops back</text>
  <text class="small" x="175" y="452" text-anchor="middle">Abandon stops cleanly</text>

  <rect class="note" x="690" y="646" width="230" height="86" rx="12" />
  <text class="label" x="805" y="676" text-anchor="middle">Gate 2 reject</text>
  <text class="small" x="805" y="701" text-anchor="middle">Stops before code</text>
  <text class="small" x="805" y="722" text-anchor="middle">Kids stay protected</text>

  <rect class="note" x="690" y="1018" width="230" height="128" rx="12" />
  <text class="label" x="805" y="1048" text-anchor="middle">Repair loop</text>
  <text class="small" x="805" y="1073" text-anchor="middle">On FAIL, Claude repairs</text>
  <text class="small" x="805" y="1094" text-anchor="middle">using exact error text</text>
  <text class="small" x="805" y="1115" text-anchor="middle">Max 3 attempts</text>
  <text class="small" x="805" y="1136" text-anchor="middle">then escalate</text>

  <rect class="note" x="60" y="1167" width="230" height="92" rx="12" />
  <text class="label" x="175" y="1197" text-anchor="middle">Gate 3 reject</text>
  <text class="small" x="175" y="1222" text-anchor="middle">No publish happens</text>
  <text class="small" x="175" y="1243" text-anchor="middle">write action is blocked</text>

  <rect class="note" x="60" y="1288" width="230" height="80" rx="12" />
  <text class="label" x="175" y="1318" text-anchor="middle">Principle</text>
  <text class="small" x="175" y="1343" text-anchor="middle">Reads are autonomous.</text>
  <text class="small" x="175" y="1362" text-anchor="middle">Writes need a human.</text>
</svg>
